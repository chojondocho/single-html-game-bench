<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Echoes Beneath the Chancel</title>
  <style>
    :root {
      --bg: #040507;
      --panel: rgba(10, 12, 18, 0.78);
      --panel-strong: rgba(18, 20, 28, 0.92);
      --line: rgba(255, 255, 255, 0.14);
      --text: #f2ede1;
      --muted: #9c9485;
      --gold: #c7a56a;
      --crimson: #cf5454;
      --teal: #78c7ca;
      --lime: #9ac48a;
      --shadow: 0 24px 90px rgba(0, 0, 0, 0.5);
      --font-head: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Georgia, serif;
      --font-ui: "Trebuchet MS", "Avenir Next", Verdana, sans-serif;
    }

    * {
      box-sizing: border-box;
      user-select: none;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background:
        radial-gradient(circle at 20% 15%, rgba(122, 23, 23, 0.22), transparent 32%),
        radial-gradient(circle at 80% 10%, rgba(20, 72, 76, 0.18), transparent 25%),
        linear-gradient(180deg, #090b10 0%, #030405 100%);
      color: var(--text);
      overflow: hidden;
      font-family: var(--font-ui);
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    #game {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      image-rendering: auto;
      background: #020304;
      display: block;
    }

    #frame {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.04), transparent 16%, transparent 84%, rgba(0, 0, 0, 0.2)),
        radial-gradient(circle at center, transparent 45%, rgba(0, 0, 0, 0.72) 100%);
      mix-blend-mode: screen;
      opacity: 0.5;
    }

    #hud {
      position: absolute;
      inset: 0;
      display: grid;
      grid-template-columns: minmax(220px, 300px) 1fr minmax(240px, 320px);
      gap: 18px;
      padding: 18px;
      pointer-events: none;
    }

    .panel {
      align-self: start;
      padding: 16px 16px 14px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(15, 17, 23, 0.86), rgba(7, 8, 11, 0.72));
      backdrop-filter: blur(12px);
      box-shadow: var(--shadow);
    }

    #hud-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    #objective {
      margin-top: 4px;
      width: min(720px, 100%);
      padding: 14px 20px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: linear-gradient(180deg, rgba(18, 21, 28, 0.78), rgba(8, 9, 13, 0.68));
      text-align: center;
      font-size: 14px;
      line-height: 1.5;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      box-shadow: var(--shadow);
    }

    #prompt {
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.48);
      border: 1px solid rgba(255, 255, 255, 0.12);
      font-size: 12px;
      letter-spacing: 0.08em;
      color: var(--muted);
      text-transform: uppercase;
      transition: opacity 0.2s ease;
    }

    .eyebrow {
      color: var(--gold);
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .title-lg {
      font-family: var(--font-head);
      font-size: 22px;
      line-height: 1.05;
      margin: 0 0 10px;
      letter-spacing: 0.04em;
      text-shadow: 0 4px 24px rgba(0, 0, 0, 0.45);
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
      font-size: 13px;
    }

    .stat-card {
      padding: 10px 12px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.03);
    }

    .stat-card strong {
      display: block;
      margin-top: 4px;
      font-size: 16px;
      color: var(--text);
      letter-spacing: 0.04em;
    }

    .bars {
      display: grid;
      gap: 12px;
      margin-top: 14px;
    }

    .bar-row {
      display: grid;
      gap: 6px;
    }

    .bar-head {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .bar {
      height: 11px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .fill {
      height: 100%;
      border-radius: inherit;
      transition: width 0.1s linear;
    }

    .fill.hp {
      background: linear-gradient(90deg, #6d1d22, #d06d62);
    }

    .fill.sanity {
      background: linear-gradient(90deg, #0b5561, #72d1d1);
    }

    .fill.xp {
      background: linear-gradient(90deg, #73531d, #d8b66c);
    }

    #minimap-wrap {
      display: grid;
      gap: 12px;
    }

    #minimap {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(0, 0, 0, 0.22);
    }

    #messages {
      display: grid;
      gap: 8px;
      min-height: 140px;
    }

    .message {
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.06);
      font-size: 12px;
      line-height: 1.45;
      color: #d9d2c6;
    }

    .message.bad {
      border-color: rgba(207, 84, 84, 0.24);
      color: #f1b0ad;
    }

    .message.good {
      border-color: rgba(154, 196, 138, 0.28);
      color: #cde8c3;
    }

    .message.ritual {
      border-color: rgba(199, 165, 106, 0.24);
      color: #ead7ae;
    }

    .small-note {
      margin-top: 12px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.45;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    #overlay {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 22px;
      background:
        radial-gradient(circle at center, rgba(12, 14, 20, 0.36), rgba(2, 3, 4, 0.82)),
        linear-gradient(180deg, rgba(0, 0, 0, 0.24), rgba(0, 0, 0, 0.66));
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.25s ease;
    }

    #overlay.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .overlay-card {
      width: min(980px, 100%);
      max-height: 90vh;
      overflow: auto;
      padding: 28px;
      border-radius: 28px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background:
        linear-gradient(180deg, rgba(16, 19, 26, 0.98), rgba(6, 7, 10, 0.95)),
        radial-gradient(circle at top, rgba(207, 84, 84, 0.12), transparent 35%);
      box-shadow: var(--shadow);
    }

    .overlay-card h1,
    .overlay-card h2 {
      margin: 0 0 10px;
      font-family: var(--font-head);
      letter-spacing: 0.04em;
    }

    .overlay-card h1 {
      font-size: clamp(34px, 6vw, 72px);
      line-height: 0.92;
    }

    .overlay-card h2 {
      font-size: clamp(24px, 4vw, 38px);
      line-height: 1;
    }

    .subtitle {
      color: #cdc3b4;
      max-width: 740px;
      font-size: 16px;
      line-height: 1.7;
      margin: 0 0 22px;
    }

    .class-grid,
    .choice-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
      margin: 20px 0 26px;
    }

    .class-card,
    .choice-card {
      position: relative;
      padding: 18px 18px 16px;
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.03);
      text-align: left;
      cursor: pointer;
      color: var(--text);
      transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease;
    }

    .class-card:hover,
    .choice-card:hover {
      transform: translateY(-2px);
      border-color: rgba(255, 255, 255, 0.24);
      background: rgba(255, 255, 255, 0.05);
    }

    .class-card.selected {
      border-color: rgba(199, 165, 106, 0.62);
      box-shadow: inset 0 0 0 1px rgba(199, 165, 106, 0.32), 0 18px 45px rgba(0, 0, 0, 0.18);
      background:
        linear-gradient(180deg, rgba(199, 165, 106, 0.08), rgba(255, 255, 255, 0.02));
    }

    .card-name {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      font-size: 18px;
      font-family: var(--font-head);
      margin-bottom: 8px;
    }

    .card-tag {
      padding: 5px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      font-size: 10px;
      font-family: var(--font-ui);
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .card-desc {
      color: #c8c0b0;
      font-size: 13px;
      line-height: 1.55;
      margin-bottom: 14px;
    }

    .card-bullets {
      display: grid;
      gap: 6px;
      color: #d9d2c6;
      font-size: 12px;
      letter-spacing: 0.04em;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 14px 22px;
      font: inherit;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease, filter 0.15s ease;
    }

    button:hover {
      transform: translateY(-1px);
      filter: brightness(1.05);
    }

    .btn-primary {
      color: #170d08;
      background: linear-gradient(180deg, #d9b26b, #9b6b2a);
      box-shadow: 0 12px 28px rgba(155, 107, 42, 0.35);
    }

    .btn-secondary {
      color: var(--text);
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin: 20px 0 26px;
    }

    .summary-card {
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .summary-card .k {
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .summary-card .v {
      margin-top: 8px;
      font-size: 28px;
      font-family: var(--font-head);
    }

    .controls {
      margin-top: 20px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.7;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    @media (max-width: 1100px) {
      #hud {
        grid-template-columns: 1fr;
        align-content: start;
      }

      #hud-left,
      #hud-right {
        max-width: 420px;
      }

      #objective {
        margin-top: 0;
      }

      .panel {
        backdrop-filter: blur(8px);
      }
    }

    @media (max-width: 700px) {
      #hud {
        padding: 10px;
        gap: 10px;
      }

      .overlay-card {
        padding: 20px;
        border-radius: 20px;
      }

      #objective {
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="game" width="480" height="270"></canvas>
    <div id="frame" aria-hidden="true"></div>
    <div id="hud">
      <div id="hud-left" class="panel"></div>
      <div id="hud-center">
        <div id="objective"></div>
        <div id="prompt"></div>
      </div>
      <div id="hud-right" class="panel">
        <div id="minimap-wrap">
          <canvas id="minimap" width="160" height="160"></canvas>
          <div id="messages"></div>
          <div class="small-note">
            WASD move · Mouse / arrows turn · Click or Space strike · Right click / F lantern burst · E interact · Q salve · R tonic
          </div>
        </div>
      </div>
    </div>
    <div id="overlay"></div>
  </div>

  <script>
    (() => {
      "use strict";

      const GAME_W = 480;
      const GAME_H = 270;
      const TEX_SIZE = 64;
      const FINAL_FLOOR = 4;
      const STORAGE_KEY = "echoes-beneath-the-chancel-meta-v1";
      const FLOOR_NAMES = [
        "The Bone Vestibule",
        "The Ward of Sleepless Bells",
        "The Root Crypt",
        "The Red Choir"
      ];
      const FLOOR_FOG = [
        [18, 20, 30],
        [22, 18, 26],
        [20, 16, 18],
        [42, 10, 12]
      ];
      const FLOOR_TINT = [
        [1.0, 1.0, 1.0],
        [0.98, 0.92, 0.95],
        [0.96, 0.88, 0.84],
        [1.02, 0.85, 0.85]
      ];
      const WHISPERS = [
        "A choir you cannot see is matching your breathing.",
        "Something just behind you knows your true name.",
        "The stones keep the taste of everyone who prayed here.",
        "You hear your own footsteps returning a second late.",
        "The chapel wants your pulse to fit its rhythm.",
        "Someone under the floor has begun to hum back."
      ];
      const ECHO_TEXT = {
        1: [
          "The novices burned the lanterns when the bells began to answer.",
          "The first lock was not for demons. It was for the choir.",
          "No one buried the bones here. The walls grew around them."
        ],
        2: [
          "Patients woke with hymns on their tongues and salt in their lungs.",
          "Every confession in this ward was collected in brass jars.",
          "A surgeon promised pain would leave. It only learned to sing."
        ],
        3: [
          "Roots entered through the crypt and learned the map of our veins.",
          "The sacrament below asked for blood, but never whose.",
          "The deeper doors are carved from things that once remembered light."
        ],
        4: [
          "The Mother does not eat flesh. She eats the part that hopes.",
          "When the last seal breaks, she remembers every voice you still carry.",
          "The exit is real. So is everything waiting beside it."
        ]
      };
      const CLASSES = [
        {
          id: "hunter",
          name: "Votive Hunter",
          title: "Balanced",
          desc: "A blade-hand and a steady lantern. Built to survive long enough to finish the work.",
          bullets: ["100 vigor", "100 sanity", "10 steel damage", "1 salve · 1 tonic"],
          stats: {
            maxHp: 100,
            maxSanity: 100,
            damage: 10,
            speed: 2.25,
            crit: 0.1,
            ward: 0.06,
            lifesteal: 0.0,
            salves: 1,
            tonics: 1
          }
        },
        {
          id: "keeper",
          name: "Lantern Keeper",
          title: "Control",
          desc: "A ritualist trained to scour the dark with borrowed light and leave enemies reeling.",
          bullets: ["86 vigor", "122 sanity", "8 steel damage", "Cheaper lantern burst"],
          stats: {
            maxHp: 86,
            maxSanity: 122,
            damage: 8,
            speed: 2.18,
            crit: 0.08,
            ward: 0.1,
            lifesteal: 0.0,
            burstCost: 14,
            burstDamage: 11,
            salves: 1,
            tonics: 2
          }
        },
        {
          id: "penitent",
          name: "Marrow Penitent",
          title: "Aggression",
          desc: "A self-mortifying zealot. Harder hits, blood for medicine, and very little room to fail.",
          bullets: ["82 vigor", "90 sanity", "13 steel damage", "8% lifesteal"],
          stats: {
            maxHp: 82,
            maxSanity: 90,
            damage: 13,
            speed: 2.32,
            crit: 0.14,
            ward: 0.0,
            lifesteal: 0.08,
            salves: 1,
            tonics: 0
          }
        }
      ];
      const BOON_POOL = [
        {
          id: "iron-prayer",
          name: "Iron Prayer",
          desc: "+20 max vigor and restore 20 health.",
          apply(player) {
            player.maxHp += 20;
            player.hp = Math.min(player.maxHp, player.hp + 20);
          }
        },
        {
          id: "candle-blood",
          name: "Candle Blood",
          desc: "+16 max sanity and restore 16 sanity.",
          apply(player) {
            player.maxSanity += 16;
            player.sanity = Math.min(player.maxSanity, player.sanity + 16);
          }
        },
        {
          id: "serrated-liturgy",
          name: "Serrated Liturgy",
          desc: "+3 steel damage.",
          apply(player) {
            player.damage += 3;
          }
        },
        {
          id: "silent-footing",
          name: "Silent Footing",
          desc: "+10% movement speed and a calmer step.",
          apply(player) {
            player.speed += 0.22;
          }
        },
        {
          id: "mercy-after",
          name: "Mercy After",
          desc: "+5% lifesteal when your blade lands.",
          apply(player) {
            player.lifesteal += 0.05;
          }
        },
        {
          id: "white-flame",
          name: "White Flame",
          desc: "Lantern burst gains damage and costs 2 less sanity.",
          apply(player) {
            player.burstDamage += 3;
            player.burstCost = Math.max(8, player.burstCost - 2);
          }
        },
        {
          id: "fever-gilt",
          name: "Fever Gilt",
          desc: "+6% critical chance.",
          apply(player) {
            player.crit += 0.06;
          }
        },
        {
          id: "grave-pocket",
          name: "Grave Pocket",
          desc: "Gain 1 salve, 1 tonic, and 10 sanity now.",
          apply(player) {
            player.salves += 1;
            player.tonics += 1;
            player.sanity = Math.min(player.maxSanity, player.sanity + 10);
          }
        }
      ];

      const canvas = document.getElementById("game");
      const ctx = canvas.getContext("2d", { alpha: false });
      ctx.imageSmoothingEnabled = false;

      const frameCanvas = document.createElement("canvas");
      frameCanvas.width = GAME_W;
      frameCanvas.height = GAME_H;
      const frameCtx = frameCanvas.getContext("2d", { alpha: false });
      const frameImage = frameCtx.createImageData(GAME_W, GAME_H);
      const framePixels = new Uint32Array(frameImage.data.buffer);
      const zBuffer = new Float32Array(GAME_W);

      const mini = document.getElementById("minimap");
      const miniCtx = mini.getContext("2d", { alpha: false });

      const hudLeft = document.getElementById("hud-left");
      const objectiveEl = document.getElementById("objective");
      const promptEl = document.getElementById("prompt");
      const messagesEl = document.getElementById("messages");
      const overlay = document.getElementById("overlay");

      const input = Object.create(null);
      const assets = { walls: {}, floors: {}, sprites: {} };

      const game = {
        state: "title",
        floor: 1,
        seed: 0,
        rng: Math.random,
        selectedClass: CLASSES[0].id,
        player: null,
        map: null,
        props: [],
        enemies: [],
        pickups: [],
        messages: [],
        time: 0,
        timer: 0,
        damageFlash: 0,
        lightFlash: 0,
        shake: 0,
        whisperCd: 0,
        cleanseCount: 0,
        cleanseGoal: 3,
        bossAwake: false,
        pendingChoices: 0,
        currentChoices: [],
        runScore: 0,
        kills: 0,
        bestMeta: loadMeta(),
        audio: null
      };

      function loadMeta() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) {
            return { bestScore: 0, deepestFloor: 0, runs: 0, wins: 0 };
          }
          const parsed = JSON.parse(raw);
          return {
            bestScore: parsed.bestScore || 0,
            deepestFloor: parsed.deepestFloor || 0,
            runs: parsed.runs || 0,
            wins: parsed.wins || 0
          };
        } catch (err) {
          return { bestScore: 0, deepestFloor: 0, runs: 0, wins: 0 };
        }
      }

      function saveMeta() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(game.bestMeta));
      }

      function mulberry32(seed) {
        let a = seed >>> 0;
        return function() {
          a += 0x6D2B79F5;
          let t = a;
          t = Math.imul(t ^ (t >>> 15), t | 1);
          t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
          return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
        };
      }

      function rand(min, max) {
        return game.rng() * (max - min) + min;
      }

      function randInt(min, max) {
        return Math.floor(rand(min, max + 1));
      }

      function pick(arr) {
        return arr[Math.floor(game.rng() * arr.length)];
      }

      function shuffle(list) {
        const out = list.slice();
        for (let i = out.length - 1; i > 0; i--) {
          const j = Math.floor(game.rng() * (i + 1));
          [out[i], out[j]] = [out[j], out[i]];
        }
        return out;
      }

      function clamp(v, lo, hi) {
        return v < lo ? lo : v > hi ? hi : v;
      }

      function lerp(a, b, t) {
        return a + (b - a) * t;
      }

      function dist(ax, ay, bx, by) {
        const dx = bx - ax;
        const dy = by - ay;
        return Math.hypot(dx, dy);
      }

      function angleDiff(a, b) {
        let d = a - b;
        while (d < -Math.PI) d += Math.PI * 2;
        while (d > Math.PI) d -= Math.PI * 2;
        return d;
      }

      function pack(r, g, b, a = 255) {
        return ((a & 255) << 24) | ((b & 255) << 16) | ((g & 255) << 8) | (r & 255);
      }

      function shadeFog(color, shade, fogAmt, tintMul) {
        const a = color & 0xff000000;
        const r = ((color & 255) * shade * tintMul[0]) | 0;
        const g = (((color >>> 8) & 255) * shade * tintMul[1]) | 0;
        const b = (((color >>> 16) & 255) * shade * tintMul[2]) | 0;
        const fog = FLOOR_FOG[game.floor - 1];
        const fr = (r * (1 - fogAmt) + fog[0] * fogAmt) | 0;
        const fg = (g * (1 - fogAmt) + fog[1] * fogAmt) | 0;
        const fb = (b * (1 - fogAmt) + fog[2] * fogAmt) | 0;
        return a | (fb << 16) | (fg << 8) | fr;
      }

      function blend(dst, src) {
        const alpha = src >>> 24;
        if (alpha >= 255) return src;
        if (alpha <= 0) return dst;
        const inv = 255 - alpha;
        const sr = src & 255;
        const sg = (src >>> 8) & 255;
        const sb = (src >>> 16) & 255;
        const dr = dst & 255;
        const dg = (dst >>> 8) & 255;
        const db = (dst >>> 16) & 255;
        const r = ((sr * alpha + dr * inv) / 255) | 0;
        const g = ((sg * alpha + dg * inv) / 255) | 0;
        const b = ((sb * alpha + db * inv) / 255) | 0;
        return 0xff000000 | (b << 16) | (g << 8) | r;
      }

      function makeTexture(painter) {
        const c = document.createElement("canvas");
        c.width = TEX_SIZE;
        c.height = TEX_SIZE;
        const g = c.getContext("2d");
        painter(g, TEX_SIZE);
        return new Uint32Array(g.getImageData(0, 0, TEX_SIZE, TEX_SIZE).data.buffer.slice(0));
      }

      function makeSprite(size, painter) {
        const c = document.createElement("canvas");
        c.width = size;
        c.height = size;
        const g = c.getContext("2d");
        painter(g, size);
        return { size, data: new Uint32Array(g.getImageData(0, 0, size, size).data.buffer.slice(0)) };
      }
